version: "3.9"

# Docker Compose file for running integration tests with MinIO and Shock services.
# Usage:
#   docker-compose -f docker-compose.test.yml up -d
#   go test ./pkg/staging/... -v -tags=integration
#   docker-compose -f docker-compose.test.yml down -v

services:
  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-net

  # MinIO setup - creates test bucket
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/test-bucket --ignore-existing;
      /usr/bin/mc anonymous set public myminio/test-bucket;
      exit 0;
      "
    networks:
      - test-net

  # MongoDB for Shock
  shock-mongo:
    image: mongo:5.0
    volumes:
      - shock-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - test-net

  # Real Shock server (pre-built image, anonymous access for testing)
  # Build the image from MG-RAST/Shock if not present:
  #   cd ../MG-RAST/Shock && docker compose -f docker-compose.local.yml build
  shock-server:
    image: shock-shock-server:latest
    depends_on:
      shock-mongo:
        condition: service_healthy
    entrypoint:
      - /go/bin/shock-server
      - --hosts=shock-mongo
      - --basic=false
      - --force_yes=true
      - --api-url=http://localhost:7445
      - --api-port=7445
    ports:
      - "7445:7445"
    volumes:
      - shock-data:/usr/local/shock/data
      - shock-logs:/var/log/shock
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7445/"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio-data:
  shock-mongo-data:
  shock-data:
  shock-logs:

networks:
  test-net:
    driver: bridge
