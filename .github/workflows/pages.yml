name: pages

# Publishes the architecture dossier to GitHub Pages at the site root:
#   https://wilke.github.io/GoWe/
# Only the dossier is published (copied to index.html) — the rest of docs/ is
# not exposed. Runs when the dossier changes, or on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - docs/architecture-dossier.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/configure-pages@v5
      - name: Assemble curated site (dossier only)
        run: |
          mkdir -p _site
          cp docs/architecture-dossier.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
