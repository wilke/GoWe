version: "3.9"

# NOTE: Poll intervals are set to 500ms for fast test responsiveness.
# For production, consider increasing to 2s or higher to reduce CPU/network overhead.

services:
  gowe-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    command:
      - "-addr"
      - ":8080"
      - "-db"
      - "/data/gowe.db"
      - "-default-executor"
      - "worker"
      - "-allow-anonymous"
      - "-anonymous-executors"
      - "local,docker,worker,container"
      - "-scheduler-poll"
      - "500ms"
      - "-upload-backend"
      - "local"
      - "-upload-local-dir"
      - "/workdir/uploads"
      - "-upload-download-dirs"
      - "/workdir/uploads,/workdir/outputs,/workdir/scratch"
      - "-debug"
    volumes:
      - gowe-data:/data
      - gowe-workdir:/workdir
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gowe-net

  worker-1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      gowe-server:
        condition: service_healthy
    command:
      - "-server"
      - "http://gowe-server:8080"
      - "-runtime"
      - "none"
      - "-name"
      - "worker-1"
      - "-workdir"
      - "/workdir/scratch"
      - "-stage-out"
      - "file:///workdir/outputs"
      - "-poll"
      - "500ms"
      - "-debug"
    volumes:
      - gowe-workdir:/workdir
      - ./testdata/cwl-v1.2:/testdata:ro
    networks:
      - gowe-net

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      gowe-server:
        condition: service_healthy
    command:
      - "-server"
      - "http://gowe-server:8080"
      - "-runtime"
      - "none"
      - "-name"
      - "worker-2"
      - "-workdir"
      - "/workdir/scratch"
      - "-stage-out"
      - "file:///workdir/outputs"
      - "-poll"
      - "500ms"
      - "-debug"
    volumes:
      - gowe-workdir:/workdir
      - ./testdata/cwl-v1.2:/testdata:ro
    networks:
      - gowe-net

  worker-docker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      gowe-server:
        condition: service_healthy
    command:
      - "-server"
      - "http://gowe-server:8080"
      - "-runtime"
      - "docker"
      - "-name"
      - "worker-docker"
      - "-workdir"
      - "/workdir/scratch"
      - "-stage-out"
      - "file:///workdir/outputs"
      - "-poll"
      - "500ms"
      - "-debug"
    environment:
      # Named Docker volume shared between worker and tool containers.
      # Tool containers mount this volume at /workdir — no path translation needed.
      - DOCKER_VOLUME=gowe-workdir
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gowe-workdir:/workdir
      - ./testdata/cwl-v1.2:/testdata:ro
    networks:
      - gowe-net

volumes:
  gowe-data:
  gowe-workdir:
    name: gowe-workdir

networks:
  gowe-net:
