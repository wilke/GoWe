# GoWe Credentials Configuration — REFERENCE TEMPLATE
# ====================================================
# This file documents the planned YAML credentials schema.
# It is NOT currently loaded by the server or worker binaries.
#
# Current state:
#   - Worker --http-credentials flag loads credentials from a JSON file (not YAML)
#   - S3 credentials use --s3-access-key/--s3-secret-key flags or AWS_* env vars
#   - Shock credentials use --shock-token flag or SHOCK_TOKEN env var
#   - BV-BRC token uses BVBRC_TOKEN env var or ~/.bvbrc_token file
#
# The ${VAR_NAME} interpolation syntax shown below is NOT implemented.
#
# See docs/planned-config.md for the planned configuration system.

# =============================================================================
# HTTP Credentials
# =============================================================================
# Used for HTTP/HTTPS staging backends
# Keys are hostname patterns (supports wildcards like *.example.com)

http:
  # Bearer token authentication
  "api.example.com":
    type: "bearer"
    token: "${API_TOKEN}"

  # Basic authentication
  "data.example.com":
    type: "basic"
    username: "user"
    password: "${DATA_PASSWORD}"

  # Custom header authentication
  "internal.example.com":
    type: "header"
    header_name: "X-API-Key"
    header_value: "${INTERNAL_API_KEY}"

  # Wildcard pattern for all subdomains
  "*.myorg.com":
    type: "bearer"
    token: "${MYORG_TOKEN}"

# =============================================================================
# S3 Credentials
# =============================================================================
# Multiple S3/S3-compatible endpoints can be configured
# Use profile names as keys

s3:
  # Default AWS S3
  default:
    region: "us-east-1"
    access_key_id: "${AWS_ACCESS_KEY_ID}"
    secret_access_key: "${AWS_SECRET_ACCESS_KEY}"

  # Local MinIO for development
  minio:
    endpoint: "localhost:9000"
    region: "us-east-1"
    access_key_id: "minioadmin"
    secret_access_key: "minioadmin"
    path_style: true
    disable_ssl: true

  # Production S3-compatible storage
  production:
    endpoint: "s3.mycompany.com"
    region: "us-west-2"
    access_key_id: "${PROD_S3_ACCESS_KEY}"
    secret_access_key: "${PROD_S3_SECRET_KEY}"
    path_style: false

# =============================================================================
# Shock Credentials
# =============================================================================
# BV-BRC Shock data storage

shock:
  # Default Shock server
  default:
    host: "p3.theseed.org"
    token: "${SHOCK_TOKEN}"

  # Local Shock for testing
  local:
    host: "localhost:7445"
    token: ""
    use_http: true

# =============================================================================
# BV-BRC Credentials
# =============================================================================

bvbrc:
  # Token from 'gowe login' command or manual retrieval
  token: "${BVBRC_TOKEN}"

  # Token expiration reminder (informational)
  # BV-BRC tokens typically expire after 14 days
