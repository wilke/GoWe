# GoReleaser — builds and publishes the four user-facing GoWe binaries on tag push.
# Docs: https://goreleaser.com  ·  validate locally with: goreleaser check
version: 2

project_name: gowe

before:
  hooks:
    - go mod download

builds:
  - id: gowe
    main: ./cmd/cli
    binary: gowe
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{ .Version }}"]
  - id: gowe-server
    main: ./cmd/server
    binary: gowe-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{ .Version }}"]
  # Linux only: workers run container/Apptainer workloads on Linux/HPC, so a
  # macOS worker binary isn't a useful artifact. (The code cross-compiles fine.)
  - id: gowe-worker
    main: ./cmd/worker
    binary: gowe-worker
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{ .Version }}"]
  - id: cwl-runner
    main: ./cmd/cwl-runner
    binary: cwl-runner
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: ["-s -w -X main.Version={{ .Version }}"]

# One archive per binary (per OS/arch). Per-binary rather than a single bundle so
# the Linux-only worker doesn't produce archives with different binary counts
# across platforms (which GoReleaser rejects), and so users can grab just the
# tool they need.
archives:
  - id: gowe
    ids: [gowe]
    name_template: "gowe_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: gowe-server
    ids: [gowe-server]
    name_template: "gowe-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: gowe-worker
    ids: [gowe-worker]
    name_template: "gowe-worker_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: cwl-runner
    ids: [cwl-runner]
    name_template: "cwl-runner_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# release-please owns CHANGELOG.md; don't let GoReleaser generate release notes.
changelog:
  disable: true

release:
  prerelease: auto
  # release-please creates the GitHub Release first; append assets to it
  # rather than failing on an existing release.
  mode: append
